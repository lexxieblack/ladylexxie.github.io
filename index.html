<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Javadocs Loader</title>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="landing-header">
        <!-- Dark Mode Toggle Button -->
        <button id="theme-toggle" aria-label="Toggle display theme" class="icon-button">
            <i class="fa-solid fa-moon"></i>
        </button>

        <h1 class="site-title">Minecraft Javadocs</h1>
        <p class="site-description">A central hub for accessing documentation across various Minecraft versions and mod
            loaders.</p>
    </header>

    <main class="container">
        <section class="content-section">
            <h2>Version Registry</h2>
            <p class="content-intro">Select the combination that matches your development environment.</p>

            <div class="version-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Minecraft</th>
                            <th>NeoForge</th>
                            <th>Fabric API</th>
                            <th>Forge</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
